<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Ninja AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.1/dist/peerjs.min.js"></script>
</head>
<body>

  <header id="siteHeader">
    <h1 id="logoText">FRUIT NINJA <span>AR</span></h1>
  </header>

  <div id="modeSelect">
    <button id="btnSingle" class="active" onclick="setMode('single')">Single Player</button>
    <button id="btnMulti" onclick="setMode('multi')">Online Multiplayer</button>
  </div>

  <div id="lobby" style="display:none;">
    <div id="hostSection">
      <button onclick="hostGame()">Host Game</button>
      <span id="roomCodeDisplay"></span>
    </div>
    <div id="joinSection">
      <input id="roomCodeInput" type="text" maxlength="6" placeholder="Enter room code" />
      <button onclick="joinGame()">Join</button>
    </div>
    <p id="lobbyStatus"></p>
  </div>

  <video id="video" autoplay playsinline></video>

  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="opponentPanel" style="display:none;">
    <p class="opponent-label">Opponent</p>
    <canvas id="opponentCanvas" width="240" height="180"></canvas>
  </div>

  <p id="status">Loading...</p>

  <script src="src/js/camera.js"></script>
  <script src="src/js/hands.js"></script>
  <script src="src/js/fruits.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/multiplayer.js"></script>
  <script src="src/js/game.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
